version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agros-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agros_billing
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: agros-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/agros_billing?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: agros-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql-data:
